<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Payment Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #172033;
    --panel: #ffffff;
    --muted: #68758c;
    --line: #dde3ee;
    --soft: #f4f7fb;
    --blue: #2754c5;
    --blue-soft: #e8eefc;
    --teal: #0f9f8f;
    --teal-soft: #dff8f4;
    --gold: #f3b23b;
    --green: #1eaf68;
    --green-soft: #def7e9;
    --red: #de3d4a;
    --red-soft: #fde7ea;
    --shadow: 0 10px 28px rgba(27, 42, 74, 0.08);
  }

  body {
    min-height: 100vh;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background: #eef2f7;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 20;
    height: 68px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    background: #111b2f;
    color: #fff;
    box-shadow: 0 2px 18px rgba(0, 0, 0, 0.18);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    min-width: 0;
    font-weight: 800;
    letter-spacing: -0.2px;
  }

  .brand-mark {
    width: 12px;
    height: 12px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--gold), #36c6b4);
  }

  .header-stats {
    display: flex;
    gap: 24px;
  }

  .hstat { text-align: right; }
  .hstat-val { font-size: 15px; font-weight: 800; color: var(--gold); }
  .hstat-label {
    margin-top: 2px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.58);
  }

  main {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 28px 0 84px;
  }

  .top-bar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: end;
    margin-bottom: 22px;
  }

  .page-title {
    font-size: clamp(24px, 3vw, 34px);
    line-height: 1.08;
    font-weight: 800;
    letter-spacing: 0;
  }

  .page-sub {
    margin-top: 7px;
    font-size: 13px;
    color: var(--muted);
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .month-box {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 4px 16px rgba(27, 42, 74, 0.05);
  }

  .month-box label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .month-box input {
    width: 142px;
    border: 0;
    color: var(--ink);
    background: transparent;
    font: 700 13px Inter, sans-serif;
    outline: none;
  }

  .btn {
    min-height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 9px 14px;
    border: 1px solid transparent;
    border-radius: 8px;
    font: 800 13px Inter, sans-serif;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
  }

  .btn:hover { transform: translateY(-1px); }
  .btn svg { width: 16px; height: 16px; flex: 0 0 auto; }
  .btn-primary { background: var(--gold); color: #152036; }
  .btn-primary:hover { background: #ffc95f; }
  .btn-ghost { background: var(--panel); color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover { border-color: #b7c2d4; }
  .btn-danger { background: var(--red-soft); color: var(--red); border-color: #fac3ca; }
  .btn-sm { min-height: 30px; padding: 6px 10px; font-size: 12px; }
  .icon-btn {
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 7px;
    background: rgba(255,255,255,0.09);
    color: rgba(255,255,255,0.78);
    cursor: pointer;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .icon-btn.danger:hover { background: rgba(222,61,74,0.25); color: #ffc7cd; }
  .icon-btn svg { width: 15px; height: 15px; }

  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 22px;
  }

  .view-switch {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .view-tab {
    min-height: 58px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    color: var(--muted);
    text-align: left;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(27, 42, 74, 0.05);
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
  }

  .view-tab:hover { transform: translateY(-1px); border-color: #b7c2d4; }

  .view-tab.active {
    border-color: var(--blue);
    background: var(--blue-soft);
    color: var(--blue);
  }

  .view-tab strong {
    display: block;
    margin-bottom: 4px;
    color: var(--ink);
    font-size: 15px;
    font-weight: 800;
  }

  .view-tab.active strong { color: var(--blue); }

  .view-tab span {
    display: block;
    font-size: 12px;
    font-weight: 700;
  }

  .summary-card {
    min-width: 0;
    padding: 15px 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 6px 18px rgba(27, 42, 74, 0.05);
  }

  .summary-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .summary-value {
    margin-top: 6px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0;
  }

  .schedule-section { margin-top: 18px; }

  .section-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    margin: 0 0 10px;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 17px;
    font-weight: 800;
  }

  .section-pill {
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    color: var(--blue);
    background: var(--blue-soft);
  }

  .section-meta {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .groups-grid {
    display: grid;
    gap: 14px;
  }

  .group-card {
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: var(--shadow);
  }

  .group-header {
    padding: 14px 16px;
    display: grid;
    grid-template-columns: minmax(210px, 1fr) minmax(160px, 0.45fr) auto auto;
    gap: 14px;
    align-items: center;
    background: #17233a;
    color: #fff;
  }

  .group-title-input {
    width: 100%;
    min-width: 0;
    padding: 7px 9px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 7px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font: 800 15px Inter, sans-serif;
    outline: none;
  }

  .group-title-input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.12);
  }

  .group-title-input::placeholder { color: rgba(255,255,255,0.45); }

  .group-sub {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.58);
    font-size: 11px;
    font-weight: 700;
  }

  .schedule-select,
  .compact-input,
  .student-input,
  .amount-input {
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--soft);
    color: var(--ink);
    font: 700 13px Inter, sans-serif;
    outline: none;
  }

  .schedule-select {
    max-width: 154px;
    padding: 7px 8px;
    border-color: rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  .schedule-select option { color: var(--ink); background: #fff; }

  .progress-box {
    display: grid;
    gap: 7px;
  }

  .progress-line {
    height: 8px;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(255,255,255,0.15);
  }

  .progress-fill {
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--teal), var(--gold));
    transition: width 0.25s ease;
  }

  .progress-copy {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    color: rgba(255,255,255,0.72);
    font-size: 12px;
    font-weight: 800;
  }

  .group-actions {
    display: flex;
    gap: 7px;
  }

  .students-area {
    overflow-x: auto;
  }

  table {
    width: 100%;
    min-width: 760px;
    border-collapse: collapse;
  }

  th {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    background: #f9fbfe;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-align: left;
    text-transform: uppercase;
  }

  td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
    font-size: 13px;
  }

  tr:last-child td { border-bottom: 0; }
  tbody tr:hover td { background: #fbfcff; }

  .student-input {
    width: 100%;
    min-width: 170px;
    padding: 8px 9px;
    background: #fff;
  }

  .amount-input {
    width: 132px;
    padding: 8px 9px;
    background: #fff;
  }

  .paid-cell {
    display: flex;
    align-items: center;
    gap: 9px;
    white-space: nowrap;
  }

  .toggle {
    position: relative;
    width: 46px;
    height: 26px;
    display: inline-block;
  }

  .toggle input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: #c8d0dd;
    cursor: pointer;
    transition: 0.18s;
  }

  .slider::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    left: 3px;
    top: 3px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.22);
    transition: 0.18s;
  }

  .toggle input:checked + .slider { background: var(--green); }
  .toggle input:checked + .slider::before { transform: translateX(20px); }

  .status-pill {
    min-width: 62px;
    display: inline-flex;
    justify-content: center;
    padding: 5px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
  }

  .status-paid { color: var(--green); background: var(--green-soft); }
  .status-unpaid { color: var(--muted); background: #eef2f7; }

  .prev-value {
    font-weight: 800;
    color: var(--muted);
    white-space: nowrap;
  }

  .prev-value.paid { color: var(--green); }

  .row-actions {
    display: flex;
    justify-content: flex-end;
  }

  .tiny-danger {
    width: 30px;
    height: 30px;
    border: 1px solid #fac3ca;
    border-radius: 7px;
    background: var(--red-soft);
    color: var(--red);
    cursor: pointer;
  }

  .add-student-row {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) 150px auto;
    gap: 9px;
    padding: 12px 14px 14px;
    border-top: 1px dashed var(--line);
    background: #fbfcff;
  }

  .compact-input {
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    background: #fff;
  }

  .empty-inline {
    padding: 20px 14px;
    color: var(--muted);
    font-size: 13px;
  }

  .empty-page {
    padding: 46px 18px;
    border: 1px dashed #bac5d6;
    border-radius: 8px;
    background: rgba(255,255,255,0.7);
    text-align: center;
    color: var(--muted);
  }

  .empty-page strong {
    display: block;
    margin-bottom: 6px;
    color: var(--ink);
    font-size: 16px;
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(12, 20, 36, 0.56);
    backdrop-filter: blur(3px);
  }

  .overlay.show { display: flex; }

  .modal {
    width: min(440px, 100%);
    padding: 24px;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.24);
  }

  .modal-title {
    margin-bottom: 18px;
    font-size: 18px;
    font-weight: 800;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .field input,
  .field select {
    width: 100%;
    min-height: 40px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    color: var(--ink);
    font: 700 13px Inter, sans-serif;
    outline: none;
  }

  .field input:focus,
  .field select:focus,
  .compact-input:focus,
  .student-input:focus,
  .amount-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(39,84,197,0.11);
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 9px;
    margin-top: 6px;
  }

  .calc-fab {
    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 25;
    width: 52px;
    height: 52px;
    border: 0;
    border-radius: 50%;
    background: var(--gold);
    color: #172033;
    box-shadow: 0 10px 26px rgba(179, 119, 24, 0.32);
    cursor: pointer;
    font-size: 21px;
    font-weight: 800;
  }

  .calc-panel {
    position: fixed;
    right: 24px;
    bottom: 88px;
    z-index: 25;
    display: none;
    width: min(326px, calc(100vw - 32px));
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    box-shadow: var(--shadow);
  }

  .calc-panel.show { display: block; }
  .calc-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 15px;
    background: #17233a;
    color: #fff;
    font-weight: 800;
    font-size: 13px;
  }
  .calc-close {
    border: 0;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 22px;
    cursor: pointer;
  }
  .calc-body { padding: 15px; }
  .calc-row {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 10px;
    align-items: center;
    margin-bottom: 11px;
  }
  .calc-row label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .calc-row input {
    min-height: 36px;
    padding: 8px 9px;
    border: 1px solid var(--line);
    border-radius: 7px;
    font: 700 13px Inter, sans-serif;
    outline: none;
  }
  .calc-result {
    margin-top: 14px;
    padding: 14px;
    border-radius: 8px;
    background: #17233a;
    color: #fff;
  }
  .calc-result small {
    display: block;
    color: rgba(255,255,255,0.58);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .calc-result strong {
    display: block;
    margin-top: 4px;
    color: var(--gold);
    font-size: 24px;
  }

  @media (max-width: 860px) {
    header { height: auto; min-height: 68px; padding: 14px 16px; align-items: flex-start; }
    .header-stats { gap: 14px; }
    .top-bar { grid-template-columns: 1fr; align-items: start; }
    .toolbar { justify-content: flex-start; }
    .summary-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .group-header { grid-template-columns: 1fr; }
    .progress-box { max-width: none; }
  }

  @media (max-width: 560px) {
    main { width: min(100% - 20px, 1180px); padding-top: 18px; }
    .brand { font-size: 14px; }
    .header-stats { width: 100%; justify-content: space-between; }
    header { flex-wrap: wrap; }
    .summary-row { grid-template-columns: 1fr; }
    .view-switch { grid-template-columns: 1fr; }
    .add-student-row { grid-template-columns: 1fr; }
    .btn { width: 100%; }
    .toolbar, .month-box { width: 100%; }
    .month-box { justify-content: space-between; }
    .calc-fab { right: 14px; bottom: 14px; }
    .calc-panel { right: 14px; bottom: 78px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="brand-mark"></span><span>Class Payments</span></div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val" id="hTotalStudents">0</div><div class="hstat-label">Students</div></div>
    <div class="hstat"><div class="hstat-val" id="hPaidCount">0</div><div class="hstat-label">Paid</div></div>
    <div class="hstat"><div class="hstat-val" id="hDueAmount">0</div><div class="hstat-label">Unpaid UZS</div></div>
  </div>
</header>

<main>
  <div class="top-bar">
    <div>
      <div class="page-title">Payment Tracker</div>
      <div class="page-sub">Payments start at zero for each month. Previous month data stays visible below.</div>
    </div>
    <div class="toolbar">
      <div class="month-box">
        <label for="monthPicker">Month</label>
        <input id="monthPicker" type="month" onchange="changeMonth(this.value)">
      </div>
      <button class="btn btn-primary" onclick="openAddGroup()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Add Class
      </button>
    </div>
  </div>

  <div class="view-switch" id="scheduleSwitch"></div>

  <section class="summary-row">
    <div class="summary-card"><div class="summary-label">This Month</div><div class="summary-value" id="sumMonth">0 UZS</div></div>
    <div class="summary-card"><div class="summary-label">Paid Amount</div><div class="summary-value" id="sumPaid">0 UZS</div></div>
    <div class="summary-card"><div class="summary-label">Not Paid</div><div class="summary-value" id="sumUnpaid">0 UZS</div></div>
    <div class="summary-card"><div class="summary-label">Previous Month Paid</div><div class="summary-value" id="sumPrevPaid">0 UZS</div></div>
  </section>

  <div id="groupsRoot"></div>
</main>

<div class="overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">Add New Class</div>
    <div class="field">
      <label for="newGroupSchedule">Class Type</label>
      <select id="newGroupSchedule">
        <option value="MWF">Monday, Wednesday, Friday (MWF)</option>
        <option value="TTS">Tuesday, Thursday, Saturday (TTS)</option>
      </select>
    </div>
    <div class="field">
      <label for="newGroupName">Class Name</label>
      <input id="newGroupName" placeholder="e.g. Elementary 13:00" onkeydown="if(event.key==='Enter') confirmAddGroup()">
    </div>
    <div class="field">
      <label for="newGroupFee">Default Payment Amount (UZS)</label>
      <input id="newGroupFee" type="number" min="0" step="1000" placeholder="e.g. 500000" onkeydown="if(event.key==='Enter') confirmAddGroup()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddGroup()">Create Class</button>
    </div>
  </div>
</div>

<button class="calc-fab" onclick="toggleCalc()" title="Earnings calculator">$</button>
<div class="calc-panel" id="calcPanel">
  <div class="calc-head">
    <span>Earnings Calculator</span>
    <button class="calc-close" onclick="toggleCalc()">×</button>
  </div>
  <div class="calc-body">
    <div class="calc-row">
      <label>Total Paid</label>
      <input id="calcTotal" type="number" min="0" placeholder="0" oninput="calcEarnings()">
    </div>
    <div class="calc-row">
      <label>Your Cut %</label>
      <input id="calcPct" type="number" value="45" min="0" max="100" oninput="calcEarnings()">
    </div>
    <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:2px" onclick="fillFromPaid()">Fill from selected month</button>
    <div class="calc-result">
      <small>Your Earnings</small>
      <strong id="calcResult">0</strong>
      <small style="margin-top:8px">Admin Gets <span id="calcAdmin">0</span></small>
    </div>
  </div>
</div>

<script>
const STORE_KEY = 'cpt_groups_v2';
const OLD_STORE_KEY = 'cpt_groups';
const SCHEDULES = {
  MWF: 'Monday, Wednesday, Friday',
  TTS: 'Tuesday, Thursday, Saturday'
};

let selectedMonth = monthKey(new Date());
let activeSchedule = 'MWF';
let groups = loadGroups();

document.getElementById('monthPicker').value = selectedMonth;

function loadGroups() {
  const saved = localStorage.getItem(STORE_KEY);
  if (saved) {
    try {
      return normalizeGroups(JSON.parse(saved));
    } catch (e) {
      return [];
    }
  }

  const old = localStorage.getItem(OLD_STORE_KEY);
  if (!old) return [];

  try {
    const oldGroups = JSON.parse(old);
    const migrated = oldGroups.map(group => ({
      id: id(),
      name: group.name || 'Untitled Class',
      schedule: group.schedule || 'MWF',
      fee: Number(group.fee) || 0,
      students: (group.students || []).map(student => ({
        id: id(),
        name: student.name || 'Student',
        amount: Number(student.amount ?? group.fee) || 0,
        payments: {}
      }))
    }));
    localStorage.setItem(STORE_KEY, JSON.stringify(migrated));
    return migrated;
  } catch (e) {
    return [];
  }
}

function normalizeGroups(list) {
  return (Array.isArray(list) ? list : []).map(group => ({
    id: group.id || id(),
    name: group.name || 'Untitled Class',
    schedule: SCHEDULES[group.schedule] ? group.schedule : 'MWF',
    fee: Number(group.fee) || 0,
    students: (Array.isArray(group.students) ? group.students : []).map(student => ({
      id: student.id || id(),
      name: student.name || 'Student',
      amount: Number(student.amount ?? group.fee) || 0,
      payments: student.payments && typeof student.payments === 'object' ? student.payments : {}
    }))
  }));
}

function save() {
  groups = normalizeGroups(groups);
  localStorage.setItem(STORE_KEY, JSON.stringify(groups));
  render();
}

function render() {
  updateHeader();
  renderSummary();
  renderScheduleSwitch();
  renderGroups();
}

function renderSummary() {
  const students = allStudents();
  const total = students.reduce((sum, item) => sum + amountFor(item.student), 0);
  const paid = students.reduce((sum, item) => sum + (isPaid(item.student, selectedMonth) ? amountFor(item.student) : 0), 0);
  const prevPaid = students.reduce((sum, item) => sum + (isPaid(item.student, previousMonth(selectedMonth)) ? amountFor(item.student) : 0), 0);
  document.getElementById('sumMonth').textContent = fmtMoney(total);
  document.getElementById('sumPaid').textContent = fmtMoney(paid);
  document.getElementById('sumUnpaid').textContent = fmtMoney(total - paid);
  document.getElementById('sumPrevPaid').textContent = fmtMoney(prevPaid);
}

function updateHeader() {
  const students = allStudents(activeSchedule).map(item => item.student);
  const paid = students.filter(student => isPaid(student, selectedMonth));
  const unpaidAmount = students.reduce((sum, student) => sum + (isPaid(student, selectedMonth) ? 0 : amountFor(student)), 0);
  document.getElementById('hTotalStudents').textContent = students.length;
  document.getElementById('hPaidCount').textContent = paid.length;
  document.getElementById('hDueAmount').textContent = compactMoney(unpaidAmount);
}

function renderScheduleSwitch() {
  const switcher = document.getElementById('scheduleSwitch');
  switcher.innerHTML = Object.keys(SCHEDULES).map(schedule => {
    const scheduleGroups = groups.filter(group => group.schedule === schedule);
    const studentCount = scheduleGroups.reduce((sum, group) => sum + group.students.length, 0);
    return `
      <button class="view-tab ${activeSchedule === schedule ? 'active' : ''}" onclick="showSchedule('${schedule}')">
        <strong>${schedule} Window</strong>
        <span>${SCHEDULES[schedule]} · ${scheduleGroups.length} classes · ${studentCount} students</span>
      </button>
    `;
  }).join('');
}

function renderGroups() {
  const root = document.getElementById('groupsRoot');
  const scheduleGroups = groups
    .map((group, index) => ({ group, index }))
    .filter(item => item.group.schedule === activeSchedule)
    .sort((a, b) => a.group.name.localeCompare(b.group.name));

  const studentCount = scheduleGroups.reduce((sum, item) => sum + item.group.students.length, 0);
  root.innerHTML = `
    <section class="schedule-section">
      <div class="section-head">
        <div class="section-title">${SCHEDULES[activeSchedule]} <span class="section-pill">${activeSchedule}</span></div>
        <div class="section-meta">${scheduleGroups.length} classes · ${studentCount} students</div>
      </div>
      <div class="groups-grid">
        ${scheduleGroups.length ? scheduleGroups.map(item => groupCard(item.group, item.index)).join('') : '<div class="empty-inline">No classes in this window yet.</div>'}
      </div>
    </section>
  `;
}

function groupCard(group, groupIndex) {
  const total = group.students.length;
  const paid = group.students.filter(student => isPaid(student, selectedMonth)).length;
  const pct = total ? Math.round((paid / total) * 100) : 0;
  const groupPaidAmount = group.students.reduce((sum, student) => sum + (isPaid(student, selectedMonth) ? amountFor(student) : 0), 0);
  const groupTotalAmount = group.students.reduce((sum, student) => sum + amountFor(student), 0);

  return `
    <article class="group-card">
      <div class="group-header">
        <div>
          <input class="group-title-input" value="${attr(group.name)}" placeholder="Class name" onchange="renameGroup(${groupIndex}, this.value)">
          <div class="group-sub">
            <span>${paid} of ${total} paid</span>
            <span>Default: ${fmtMoney(group.fee)}</span>
            <span>${fmtMoney(groupPaidAmount)} / ${fmtMoney(groupTotalAmount)}</span>
          </div>
        </div>
        <select class="schedule-select" onchange="changeGroupSchedule(${groupIndex}, this.value)">
          <option value="MWF" ${group.schedule === 'MWF' ? 'selected' : ''}>MWF</option>
          <option value="TTS" ${group.schedule === 'TTS' ? 'selected' : ''}>TTS</option>
        </select>
        <div class="progress-box">
          <div class="progress-line"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-copy"><span>${pct}%</span><span>${monthLabel(selectedMonth)}</span></div>
        </div>
        <div class="group-actions">
          <button class="icon-btn" onclick="focusNewStudent(${groupIndex})" title="Add student">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button class="icon-btn danger" onclick="deleteGroup(${groupIndex})" title="Delete class">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div class="students-area">
        ${total ? studentsTable(group, groupIndex) : '<div class="empty-inline">No students yet. Add the first student below.</div>'}
        <div class="add-student-row">
          <input class="compact-input" id="newStudentName_${groupIndex}" placeholder="Student name" onkeydown="if(event.key==='Enter') addStudent(${groupIndex})">
          <input class="compact-input" id="newStudentAmount_${groupIndex}" type="number" min="0" step="1000" placeholder="${group.fee || 'Amount'}" onkeydown="if(event.key==='Enter') addStudent(${groupIndex})">
          <button class="btn btn-primary btn-sm" onclick="addStudent(${groupIndex})">Add Student</button>
        </div>
      </div>
    </article>
  `;
}

function studentsTable(group, groupIndex) {
  return `
    <table>
      <thead>
        <tr>
          <th style="width:48px">#</th>
          <th>Student Name</th>
          <th style="width:160px">Amount</th>
          <th style="width:180px">${monthLabel(selectedMonth)}</th>
          <th style="width:160px">Previous Month</th>
          <th style="width:54px"></th>
        </tr>
      </thead>
      <tbody>
        ${group.students.map((student, studentIndex) => studentRow(student, groupIndex, studentIndex)).join('')}
      </tbody>
    </table>
  `;
}

function studentRow(student, groupIndex, studentIndex) {
  const paid = isPaid(student, selectedMonth);
  const prevPaid = isPaid(student, previousMonth(selectedMonth));
  return `
    <tr>
      <td style="color:#8793a8;font-weight:800">${studentIndex + 1}</td>
      <td>
        <input class="student-input" value="${attr(student.name)}" onchange="renameStudent(${groupIndex}, ${studentIndex}, this.value)">
      </td>
      <td>
        <input class="amount-input" type="number" min="0" step="1000" value="${amountFor(student)}" onchange="changeStudentAmount(${groupIndex}, ${studentIndex}, this.value)">
      </td>
      <td>
        <div class="paid-cell">
          <label class="toggle">
            <input type="checkbox" ${paid ? 'checked' : ''} onchange="togglePaid(${groupIndex}, ${studentIndex}, this.checked)">
            <span class="slider"></span>
          </label>
          <span class="status-pill ${paid ? 'status-paid' : 'status-unpaid'}">${paid ? 'Paid' : 'Zero'}</span>
        </div>
      </td>
      <td>
        <span class="prev-value ${prevPaid ? 'paid' : ''}">${prevPaid ? fmtMoney(amountFor(student)) : '0 UZS'}</span>
      </td>
      <td>
        <div class="row-actions"><button class="tiny-danger" onclick="deleteStudent(${groupIndex}, ${studentIndex})" title="Delete student">×</button></div>
      </td>
    </tr>
  `;
}

function changeMonth(value) {
  selectedMonth = value || monthKey(new Date());
  render();
}

function showSchedule(schedule) {
  activeSchedule = SCHEDULES[schedule] ? schedule : 'MWF';
  render();
}

function renameGroup(groupIndex, value) {
  groups[groupIndex].name = value.trim() || 'Untitled Class';
  save();
}

function changeGroupSchedule(groupIndex, value) {
  groups[groupIndex].schedule = SCHEDULES[value] ? value : 'MWF';
  activeSchedule = groups[groupIndex].schedule;
  save();
}

function renameStudent(groupIndex, studentIndex, value) {
  groups[groupIndex].students[studentIndex].name = value.trim() || 'Student';
  save();
}

function changeStudentAmount(groupIndex, studentIndex, value) {
  groups[groupIndex].students[studentIndex].amount = Math.max(0, Number(value) || 0);
  save();
}

function togglePaid(groupIndex, studentIndex, value) {
  const student = groups[groupIndex].students[studentIndex];
  student.payments = student.payments || {};
  student.payments[selectedMonth] = Boolean(value);
  save();
}

function addStudent(groupIndex) {
  const nameInput = document.getElementById(`newStudentName_${groupIndex}`);
  const amountInput = document.getElementById(`newStudentAmount_${groupIndex}`);
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.focus();
    return;
  }
  const group = groups[groupIndex];
  const amount = amountInput.value === '' ? group.fee : Number(amountInput.value);
  group.students.push({
    id: id(),
    name,
    amount: Math.max(0, Number(amount) || 0),
    payments: {}
  });
  save();
  setTimeout(() => focusNewStudent(groupIndex), 40);
}

function deleteStudent(groupIndex, studentIndex) {
  const student = groups[groupIndex].students[studentIndex];
  if (!confirm(`Remove "${student.name}"?`)) return;
  groups[groupIndex].students.splice(studentIndex, 1);
  save();
}

function deleteGroup(groupIndex) {
  const group = groups[groupIndex];
  if (!confirm(`Delete "${group.name}" and its students?`)) return;
  groups.splice(groupIndex, 1);
  save();
}

function openAddGroup() {
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('newGroupSchedule').value = activeSchedule;
  document.getElementById('newGroupName').value = '';
  document.getElementById('newGroupFee').value = '';
  setTimeout(() => document.getElementById('newGroupName').focus(), 60);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function closeModalOutside(event) {
  if (event.target.id === 'modalOverlay') closeModal();
}

function confirmAddGroup() {
  const schedule = document.getElementById('newGroupSchedule').value;
  const name = document.getElementById('newGroupName').value.trim();
  const fee = Math.max(0, Number(document.getElementById('newGroupFee').value) || 0);
  if (!name) {
    document.getElementById('newGroupName').focus();
    return;
  }
  groups.push({
    id: id(),
    name,
    schedule: SCHEDULES[schedule] ? schedule : 'MWF',
    fee,
    students: []
  });
  activeSchedule = SCHEDULES[schedule] ? schedule : 'MWF';
  save();
  closeModal();
}

function focusNewStudent(groupIndex) {
  const input = document.getElementById(`newStudentName_${groupIndex}`);
  if (input) input.focus();
}

function toggleCalc() {
  document.getElementById('calcPanel').classList.toggle('show');
}

function calcEarnings() {
  const total = Number(document.getElementById('calcTotal').value) || 0;
  const pct = Number(document.getElementById('calcPct').value) || 0;
  const earnings = Math.round(total * pct / 100);
  document.getElementById('calcResult').textContent = fmtMoney(earnings);
  document.getElementById('calcAdmin').textContent = fmtMoney(total - earnings);
}

function fillFromPaid() {
  const total = allStudents(activeSchedule).reduce((sum, item) => {
    return sum + (isPaid(item.student, selectedMonth) ? amountFor(item.student) : 0);
  }, 0);
  document.getElementById('calcTotal').value = total || '';
  document.getElementById('calcPanel').classList.add('show');
  calcEarnings();
}

function allStudents(schedule = null) {
  return groups
    .filter(group => !schedule || group.schedule === schedule)
    .flatMap(group => group.students.map(student => ({ group, student })));
}

function isPaid(student, key) {
  return Boolean(student.payments && student.payments[key]);
}

function amountFor(student) {
  return Math.max(0, Number(student.amount) || 0);
}

function monthKey(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  return `${year}-${month}`;
}

function previousMonth(key) {
  const [year, month] = key.split('-').map(Number);
  const date = new Date(year, month - 2, 1);
  return monthKey(date);
}

function monthLabel(key) {
  const [year, month] = key.split('-').map(Number);
  return new Date(year, month - 1, 1).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

function fmtMoney(value) {
  return `${fmtNum(Math.round(Number(value) || 0))} UZS`;
}

function compactMoney(value) {
  const n = Math.round(Number(value) || 0);
  if (n >= 1000000) return `${(n / 1000000).toFixed(n % 1000000 ? 1 : 0)}M`;
  if (n >= 1000) return `${Math.round(n / 1000)}K`;
  return String(n);
}

function fmtNum(value) {
  return Number(value || 0).toLocaleString('en-US');
}

function id() {
  return `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 9)}`;
}

function attr(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

render();
</script>
</body>
</html>
